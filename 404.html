<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Redirecting…</title>
    <script>
      // Fix GitHub Pages 404 on client-side routing (e.g., React Router)
      const redirectPath = location.pathname + location.search + location.hash;
      const base = '/bahrain_fine_art'; // your repo name
      const target = base + '/?redirect=' + encodeURIComponent(redirectPath);
      location.replace(target);
    </script>
  </head>
  <body>
    <p>Redirecting…</p>
  </body>
</html>
